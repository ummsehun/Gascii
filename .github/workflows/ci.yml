name: CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GASCII_ASSETS_URL: ${{ vars.GASCII_ASSETS_URL || secrets.GASCII_ASSETS_URL }}

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release inputs
        run: |
          if [ -z "${GASCII_ASSETS_URL}" ]; then
            echo "GASCII_ASSETS_URL is not set. Release packages will include empty assets/audio and assets/video directories."
          else
            echo "GASCII_ASSETS_URL is set. Release packages will include assets from the downloaded archive."
          fi

  build-linux:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Release tags must look like v0.1 or v0.1.2"
            exit 1
          fi
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libopencv-dev clang libclang-dev build-essential lz4 libasound2-dev unzip
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$(find /usr/lib -name 'libclang.so' -printf '%h' -quit)" >> "$GITHUB_ENV"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          mkdir -p release-assets
          if [ -n "${GASCII_ASSETS_URL}" ]; then
            curl -L "${GASCII_ASSETS_URL}" -o gascii-assets.zip
            unzip -q gascii-assets.zip -d release-assets
          fi
          mkdir -p release-assets/assets/video release-assets/assets/audio
          test -d release-assets/assets/video
          test -d release-assets/assets/audio
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          version="${GITHUB_REF_NAME}"
          package_dir="gascii-${version}-linux-x64"
          mkdir -p "dist/${package_dir}/bin"
          mkdir -p "dist/${package_dir}/lib"
          mkdir -p "dist/${package_dir}/logs"
          cp -R release-assets/assets "dist/${package_dir}/assets"
          cp target/release/Gascii "dist/${package_dir}/bin/gascii"
          chmod +x "dist/${package_dir}/bin/gascii"
          find /usr/lib /usr/local/lib -name 'libopencv*.so*' -type f -exec cp -L {} "dist/${package_dir}/lib/" \; 2>/dev/null || true
          mv "dist/${package_dir}/bin/gascii" "dist/${package_dir}/bin/gascii-bin"
          cat > "dist/${package_dir}/bin/gascii" <<'EOF'
          #!/usr/bin/env bash
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          LD_LIBRARY_PATH="$DIR/../lib:${LD_LIBRARY_PATH:-}" exec "$DIR/gascii-bin" "$@"
          EOF
          chmod +x "dist/${package_dir}/bin/gascii"
          cat > "dist/${package_dir}/manifest.json" <<EOF
          {
            "id": "gascii",
            "name": "Gascii",
            "version": "${version#v}",
            "platform": "linux-x64",
            "entry": "bin/gascii",
            "assets": "assets",
            "runtime": {
              "opencv": {
                "bundled": true
              }
            }
          }
          EOF
          tar -czf "dist/${package_dir}.tar.gz" -C dist "${package_dir}"
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gascii-linux-x64
          path: dist/*.tar.gz

  build-windows:
    needs: validate-release-inputs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}\vcpkg-cache
          key: vcpkg-windows-${{ hashFiles('Cargo.lock', '.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-windows-
      - name: Validate release tag
        shell: powershell
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v[0-9]+\.[0-9]+(\.[0-9]+)?$') {
            throw "Release tags must look like v0.1 or v0.1.2"
          }
      - name: Install LLVM, vcpkg, and OpenCV
        shell: powershell
        run: |
          $llvmBin = Join-Path $env:ProgramFiles "LLVM\bin"
          if (!(Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            choco install llvm -y --no-progress
          }
          if (!(Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll was not found in $llvmBin"
          }

          New-Item -ItemType Directory -Force -Path "$env:RUNNER_WORKSPACE\vcpkg-cache" | Out-Null
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $env:RUNNER_WORKSPACE\vcpkg
          & $env:RUNNER_WORKSPACE\vcpkg\bootstrap-vcpkg.bat
          $env:VCPKG_BINARY_SOURCES = "clear;files,$env:RUNNER_WORKSPACE\vcpkg-cache,readwrite"
          & $env:RUNNER_WORKSPACE\vcpkg\vcpkg.exe install opencv4:x64-windows
          echo "VCPKG_ROOT=$env:RUNNER_WORKSPACE\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV
          echo "VCPKGRS_TRIPLET=x64-windows" >> $env:GITHUB_ENV
          echo "VCPKG_BINARY_SOURCES=clear;files,$env:RUNNER_WORKSPACE\vcpkg-cache,readwrite" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          echo "$llvmBin" >> $env:GITHUB_PATH
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        env:
          RUST_BACKTRACE: "1"
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null
          if (![string]::IsNullOrWhiteSpace($env:GASCII_ASSETS_URL)) {
            Invoke-WebRequest -Uri $env:GASCII_ASSETS_URL -OutFile "gascii-assets.zip"
            Expand-Archive -Path "gascii-assets.zip" -DestinationPath "release-assets" -Force
          }
          New-Item -ItemType Directory -Force -Path "release-assets\assets\video" | Out-Null
          New-Item -ItemType Directory -Force -Path "release-assets\assets\audio" | Out-Null
          if (!(Test-Path "release-assets\assets\video")) {
            throw "Asset archive must contain assets/video"
          }
          if (!(Test-Path "release-assets\assets\audio")) {
            throw "Asset archive must contain assets/audio"
          }
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $packageDir = "gascii-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path "dist\$packageDir" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist\$packageDir\logs" | Out-Null
          Copy-Item "release-assets\assets" "dist\$packageDir\assets" -Recurse
          Copy-Item "target\release\Gascii.exe" "dist\$packageDir\gascii.exe"
          Copy-Item "$env:RUNNER_WORKSPACE\vcpkg\installed\x64-windows\bin\*.dll" "dist\$packageDir\" -ErrorAction SilentlyContinue
          $manifest = @"
          {
            "id": "gascii",
            "name": "Gascii",
            "version": "$($version.TrimStart('v'))",
            "platform": "windows-x64",
            "entry": "gascii.exe",
            "assets": "assets",
            "runtime": {
              "opencv": {
                "bundled": true
              }
            }
          }
          "@
          Set-Content -Path "dist\$packageDir\manifest.json" -Value $manifest
          Compress-Archive -Path "dist\$packageDir" -DestinationPath "dist\$packageDir.zip" -Force
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gascii-windows-x64
          path: dist/*.zip

  build-macos-arm64:
    needs: validate-release-inputs
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Release tags must look like v0.1 or v0.1.2"
            exit 1
          fi
      - name: Install Homebrew deps
        run: |
          brew update
          brew install opencv lz4 pkg-config
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          mkdir -p release-assets
          if [ -n "${GASCII_ASSETS_URL}" ]; then
            curl -L "${GASCII_ASSETS_URL}" -o gascii-assets.zip
            unzip -q gascii-assets.zip -d release-assets
          fi
          mkdir -p release-assets/assets/video release-assets/assets/audio
          test -d release-assets/assets/video
          test -d release-assets/assets/audio
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          version="${GITHUB_REF_NAME}"
          package_dir="gascii-${version}-darwin-arm64"
          mkdir -p "dist/${package_dir}/bin"
          mkdir -p "dist/${package_dir}/lib"
          mkdir -p "dist/${package_dir}/logs"
          cp -R release-assets/assets "dist/${package_dir}/assets"
          cp target/release/Gascii "dist/${package_dir}/bin/gascii"
          chmod +x "dist/${package_dir}/bin/gascii"
          opencv_prefix="$(brew --prefix opencv)"
          find "$opencv_prefix/lib" -name 'libopencv*.dylib' -type f -exec cp -L {} "dist/${package_dir}/lib/" \;
          for lib in dist/${package_dir}/lib/*.dylib; do
            [ -e "$lib" ] || continue
            chmod +w "$lib"
            install_name_tool -id "@rpath/$(basename "$lib")" "$lib" || true
          done
          for lib in dist/${package_dir}/lib/*.dylib; do
            [ -e "$lib" ] || continue
            base="$(basename "$lib")"
            install_name_tool -change "$lib" "@rpath/$base" "dist/${package_dir}/bin/gascii" || true
          done
          install_name_tool -add_rpath "@loader_path/../lib" "dist/${package_dir}/bin/gascii" || true
          cat > "dist/${package_dir}/manifest.json" <<EOF
          {
            "id": "gascii",
            "name": "Gascii",
            "version": "${version#v}",
            "platform": "darwin-arm64",
            "entry": "bin/gascii",
            "assets": "assets",
            "runtime": {
              "opencv": {
                "bundled": true
              }
            }
          }
          EOF
          tar -czf "dist/${package_dir}.tar.gz" -C dist "${package_dir}"
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gascii-darwin-arm64
          path: dist/*.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List release files
        run: ls -la artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
