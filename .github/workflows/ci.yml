name: CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Release tags must look like v0.1 or v0.1.2"
            exit 1
          fi
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libopencv-dev clang libclang-dev build-essential lz4 libasound2-dev unzip
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$(find /usr/lib -name 'libclang.so' -printf '%h' -quit)" >> "$GITHUB_ENV"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          mkdir -p release-assets/assets/video release-assets/assets/audio
          test -d release-assets/assets/video
          test -d release-assets/assets/audio
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          version="${GITHUB_REF_NAME}"
          package_dir="gascii-${version}-linux-x64"
          mkdir -p "dist/${package_dir}/bin"
          mkdir -p "dist/${package_dir}/lib"
          mkdir -p "dist/${package_dir}/logs"
          cp -R release-assets/assets "dist/${package_dir}/assets"
          cp target/release/Gascii "dist/${package_dir}/bin/gascii"
          chmod +x "dist/${package_dir}/bin/gascii"
          find /usr/lib /usr/local/lib -name 'libopencv*.so*' -type f -exec cp -L {} "dist/${package_dir}/lib/" \; 2>/dev/null || true
          mv "dist/${package_dir}/bin/gascii" "dist/${package_dir}/bin/gascii-bin"
          cat > "dist/${package_dir}/bin/gascii" <<'EOF'
          #!/usr/bin/env bash
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          LD_LIBRARY_PATH="$DIR/../lib:${LD_LIBRARY_PATH:-}" exec "$DIR/gascii-bin" "$@"
          EOF
          chmod +x "dist/${package_dir}/bin/gascii"
          cat > "dist/${package_dir}/manifest.json" <<EOF
          {
            "id": "gascii",
            "name": "Gascii",
            "version": "${version#v}",
            "platform": "linux-x64",
            "entry": "bin/gascii",
            "assets": "assets",
            "runtime": {
              "opencv": {
                "bundled": true
              }
            }
          }
          EOF
          tar -czf "dist/${package_dir}.tar.gz" -C dist "${package_dir}"
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gascii-linux-x64
          path: dist/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        shell: powershell
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v[0-9]+\.[0-9]+(\.[0-9]+)?$') {
            throw "Release tags must look like v0.1 or v0.1.2"
          }
      - name: Install LLVM and OpenCV
        shell: powershell
        run: |
          $llvmBin = Join-Path $env:ProgramFiles "LLVM\bin"
          if (!(Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            choco install llvm -y --no-progress
          }
          if (!(Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll was not found in $llvmBin"
          }

          choco install opencv -y --no-progress --package-parameters "'/InstallationPath:C:\tools /Environment'"

          $searchRoots = @(
            "C:\tools",
            "$env:ChocolateyInstall\lib"
          ) | Where-Object { Test-Path $_ }

          $opencv2Dir = Get-ChildItem -Path $searchRoots -Recurse -Directory -Filter "opencv2" -ErrorAction SilentlyContinue |
            Where-Object { Test-Path (Join-Path $_.FullName "core\version.hpp") } |
            Select-Object -First 1
          if ($null -eq $opencv2Dir) {
            throw "Could not find OpenCV headers after Chocolatey install"
          }
          $opencvIncludeDir = Split-Path $opencv2Dir.FullName -Parent

          $opencvLib = Get-ChildItem -Path $searchRoots -Recurse -File -Filter "opencv_world*.lib" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\" } |
            Sort-Object FullName |
            Select-Object -First 1
          if ($null -eq $opencvLib) {
            throw "Could not find opencv_world*.lib after Chocolatey install"
          }
          $opencvLinkDir = $opencvLib.DirectoryName
          $opencvLinkLib = [System.IO.Path]::GetFileNameWithoutExtension($opencvLib.Name)

          $opencvDll = Get-ChildItem -Path $searchRoots -Recurse -File -Filter "$opencvLinkLib.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\" } |
            Sort-Object FullName |
            Select-Object -First 1
          if ($null -eq $opencvDll) {
            throw "Could not find $opencvLinkLib.dll after Chocolatey install"
          }
          $opencvDllDir = $opencvDll.DirectoryName

          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvmBin"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_INCLUDE_PATHS=$opencvIncludeDir"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_LINK_PATHS=$opencvLinkDir"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_LINK_LIBS=$opencvLinkLib"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENCV_DLL_DIR=$opencvDllDir"
          Add-Content -Path $env:GITHUB_PATH -Value $llvmBin
          Add-Content -Path $env:GITHUB_PATH -Value $opencvDllDir

          Write-Host "OpenCV include: $opencvIncludeDir"
          Write-Host "OpenCV link dir: $opencvLinkDir"
          Write-Host "OpenCV link lib: $opencvLinkLib"
          Write-Host "OpenCV DLL dir: $opencvDllDir"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        env:
          RUST_BACKTRACE: "1"
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null
          New-Item -ItemType Directory -Force -Path "release-assets\assets\video" | Out-Null
          New-Item -ItemType Directory -Force -Path "release-assets\assets\audio" | Out-Null
          if (!(Test-Path "release-assets\assets\video")) {
            throw "Asset archive must contain assets/video"
          }
          if (!(Test-Path "release-assets\assets\audio")) {
            throw "Asset archive must contain assets/audio"
          }
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $packageDir = "gascii-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path "dist\$packageDir" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist\$packageDir\logs" | Out-Null
          Copy-Item "release-assets\assets" "dist\$packageDir\assets" -Recurse
          Copy-Item "target\release\Gascii.exe" "dist\$packageDir\gascii.exe"
          Copy-Item "$env:OPENCV_DLL_DIR\*.dll" "dist\$packageDir\" -ErrorAction Stop
          $manifest = @"
          {
            "id": "gascii",
            "name": "Gascii",
            "version": "$($version.TrimStart('v'))",
            "platform": "windows-x64",
            "entry": "gascii.exe",
            "assets": "assets",
            "runtime": {
              "opencv": {
                "bundled": true
              }
            }
          }
          "@
          Set-Content -Path "dist\$packageDir\manifest.json" -Value $manifest
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipPath = "dist\$packageDir.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          $sourceRoot = (Resolve-Path "dist\$packageDir").Path
          $zip = [System.IO.Compression.ZipFile]::Open($zipPath, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
            Get-ChildItem -Path $sourceRoot -Directory -Recurse | ForEach-Object {
              $relative = $_.FullName.Substring($sourceRoot.Length) -replace '^[\\/]+', ''
              $entryName = "$packageDir/$($relative -replace '\\', '/')/"
              $null = $zip.CreateEntry($entryName)
            }

            Get-ChildItem -Path $sourceRoot -File -Recurse | ForEach-Object {
              $relative = $_.FullName.Substring($sourceRoot.Length) -replace '^[\\/]+', ''
              $entryName = "$packageDir/$($relative -replace '\\', '/')"
              $null = [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entryName)
            }
          } finally {
            $zip.Dispose()
          }

          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $invalidEntry = $zip.Entries | Where-Object { $_.FullName.Contains('\') } | Select-Object -First 1
            if ($null -ne $invalidEntry) {
              throw "ZIP entry contains Windows path separators: $($invalidEntry.FullName)"
            }
          } finally {
            $zip.Dispose()
          }
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gascii-windows-x64
          path: dist/*.zip

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Release tags must look like v0.1 or v0.1.2"
            exit 1
          fi
      - name: Install Homebrew deps
        run: |
          brew update
          brew install opencv lz4 pkg-config
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --verbose
      - name: Prepare assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          mkdir -p release-assets/assets/video release-assets/assets/audio
          test -d release-assets/assets/video
          test -d release-assets/assets/audio
      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux
          version="${GITHUB_REF_NAME}"
          package_dir="gascii-${version}-darwin-arm64"
          mkdir -p "dist/${package_dir}/bin"
          mkdir -p "dist/${package_dir}/lib"
          mkdir -p "dist/${package_dir}/logs"
          cp -R release-assets/assets "dist/${package_dir}/assets"
          cp target/release/Gascii "dist/${package_dir}/bin/gascii"
          chmod +x "dist/${package_dir}/bin/gascii"
          opencv_prefix="$(brew --prefix opencv)"
          find "$opencv_prefix/lib" -name 'libopencv*.dylib' -type f -exec cp -L {} "dist/${package_dir}/lib/" \;
          for lib in dist/${package_dir}/lib/*.dylib; do
            [ -e "$lib" ] || continue
            chmod +w "$lib"
            install_name_tool -id "@rpath/$(basename "$lib")" "$lib" || true
          done
          for lib in dist/${package_dir}/lib/*.dylib; do
            [ -e "$lib" ] || continue
            base="$(basename "$lib")"
            install_name_tool -change "$lib" "@rpath/$base" "dist/${package_dir}/bin/gascii" || true
          done
          install_name_tool -add_rpath "@loader_path/../lib" "dist/${package_dir}/bin/gascii" || true
          cat > "dist/${package_dir}/manifest.json" <<EOF
          {
            "id": "gascii",
            "name": "Gascii",
            "version": "${version#v}",
            "platform": "darwin-arm64",
            "entry": "bin/gascii",
            "assets": "assets",
            "runtime": {
              "opencv": {
                "bundled": true
              }
            }
          }
          EOF
          tar -czf "dist/${package_dir}.tar.gz" -C dist "${package_dir}"
      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gascii-darwin-arm64
          path: dist/*.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List release files
        run: ls -la artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
